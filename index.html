<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
<title>Spare Price Finder</title>

<!-- PWA manifest -->
<link rel="manifest" href="manifest.json">

<!-- iOS PWA -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Spare Finder">
<link rel="apple-touch-icon" href="icons/icon-180.png">

<!-- Theme -->
<meta name="theme-color" content="#1a1d27">
<meta name="mobile-web-app-capable" content="yes">

<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@700;800&display=swap" rel="stylesheet">

<style>
:root {
  --bg: #0f1117;
  --surface: #1a1d27;
  --surface2: #22263a;
  --border: #2e3347;
  --accent: #6c63ff;
  --accent2: #00d4aa;
  --danger: #ff4757;
  --text: #e8eaf0;
  --muted: #7a7f94;
  --card-h: 88px;
  --safe-top: env(safe-area-inset-top, 0px);
  --safe-bot: env(safe-area-inset-bottom, 0px);

  --INCELL: #3b82f6;
  --OLED:   #10b981;
  --GX:     #f59e0b;
  --OG:     #ef4444;
  --AAA:    #8b5cf6;
  --TFT:    #64748b;
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

body {
  font-family: 'DM Mono', monospace;
  background: var(--bg);
  color: var(--text);
  min-height: 100dvh;
  overscroll-behavior: none;
  /* Safe area for notch/dynamic island */
  padding-top: var(--safe-top);
  padding-bottom: var(--safe-bot);
}

/* ── Header ── */
.header {
  position: fixed; top: var(--safe-top); left: 0; right: 0; z-index: 100;
  height: 56px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 16px;
}
.header-title {
  font-family: 'Syne', sans-serif;
  font-size: 17px; font-weight: 800;
  letter-spacing: 0.02em;
  background: linear-gradient(90deg, var(--accent), var(--accent2));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
}
.count-badge {
  font-size: 12px; color: var(--accent2);
  background: rgba(0,212,170,0.12);
  border: 1px solid rgba(0,212,170,0.25);
  padding: 3px 10px; border-radius: 20px;
  font-weight: 500;
}

/* ── Tabs ── */
.tabs {
  position: fixed; top: calc(var(--safe-top) + 56px); left: 0; right: 0; z-index: 99;
  display: flex;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
}
.tab {
  flex: 1; padding: 12px 0; text-align: center;
  font-size: 13px; font-weight: 500; letter-spacing: 0.05em;
  color: var(--muted);
  cursor: pointer; transition: color .2s;
  text-transform: uppercase;
  position: relative;
}
.tab.active { color: var(--accent); }
.tab.active::after {
  content: '';
  position: absolute; bottom: 0; left: 20%; right: 20%; height: 2px;
  background: var(--accent); border-radius: 2px;
}

/* ── Panels ── */
.panel { display: none; padding-top: calc(var(--safe-top) + 108px); padding-bottom: calc(var(--safe-bot) + 24px); }
.panel.active { display: block; }

/* ── Add Panel ── */
.form-wrap { padding: 12px; display: flex; flex-direction: column; gap: 10px; }

.field-label {
  font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase;
  color: var(--muted); margin-bottom: 4px;
}
.field {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 12px;
}
input, textarea {
  width: 100%;
  background: transparent;
  border: none; outline: none;
  color: var(--text);
  font-family: 'DM Mono', monospace;
  font-size: 15px;
  caret-color: var(--accent);
}
input::placeholder, textarea::placeholder { color: var(--muted); }
textarea { height: 160px; resize: none; line-height: 1.5; }

.field:focus-within {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px rgba(108,99,255,0.12);
}

.btn {
  width: 100%; padding: 15px;
  font-family: 'DM Mono', monospace;
  font-size: 15px; font-weight: 500; letter-spacing: 0.08em;
  border: none; border-radius: 12px;
  cursor: pointer;
  text-transform: uppercase;
  transition: transform .1s, opacity .2s;
  -webkit-user-select: none;
}
.btn:active { transform: scale(0.97); opacity: 0.85; }
.btn-add { background: var(--accent); color: #fff; }
.btn-clear { background: transparent; color: var(--danger); border: 1px solid var(--danger); margin-top: 4px; }

.btn-row { display: flex; gap: 8px; }
.btn-row .btn { flex: 1; }
.btn-export { background: var(--surface2); color: var(--accent2); border: 1px solid rgba(0,212,170,0.3); font-size: 13px; padding: 13px 8px; }
.btn-import { background: var(--surface2); color: var(--accent); border: 1px solid rgba(108,99,255,0.3); font-size: 13px; padding: 13px 8px; }

/* ── Search Panel ── */
.search-wrap { padding: 12px 12px 8px; }
.search-box {
  display: flex; align-items: center; gap: 10px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px; padding: 11px 14px;
}
.search-box:focus-within { border-color: var(--accent); }
.search-icon { color: var(--muted); font-size: 18px; flex-shrink: 0; }
.search-box input { font-size: 16px; }

.results-meta {
  padding: 8px 14px 4px;
  font-size: 11px; color: var(--muted); letter-spacing: 0.06em; text-transform: uppercase;
}

/* ── Virtual Scroll ── */
#scroll-container {
  position: relative;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
}
#scroll-spacer { width: 1px; }
#scroll-visible { position: absolute; left: 0; right: 0; top: 0; }

/* ── Card ── */
.card {
  height: var(--card-h);
  display: flex; flex-direction: column; justify-content: center;
  padding: 10px 14px;
  border-bottom: 1px solid var(--border);
  background: var(--bg);
  overflow: hidden;
}
.card-top { display: flex; align-items: baseline; gap: 8px; margin-bottom: 3px; }
.card-model { font-size: 14px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; flex: 1; }
.card-price { font-size: 16px; font-weight: 500; color: var(--accent2); flex-shrink: 0; }
.card-bottom { display: flex; align-items: center; gap: 8px; }
.badge {
  display: inline-block; padding: 2px 7px;
  font-size: 10px; letter-spacing: 0.06em; text-transform: uppercase;
  border-radius: 4px; color: #fff; flex-shrink: 0; font-weight: 500;
}
.card-meta { font-size: 11px; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

.empty-state { padding: 60px 20px; text-align: center; color: var(--muted); }
.empty-icon { font-size: 40px; margin-bottom: 12px; }
.empty-title { font-family: 'Syne', sans-serif; font-size: 16px; color: var(--text); margin-bottom: 6px; }
.empty-sub { font-size: 12px; line-height: 1.6; }

/* ── Install banner ── */
#install-banner {
  display: none;
  position: fixed; bottom: calc(var(--safe-bot) + 12px); left: 12px; right: 12px;
  background: var(--surface2); border: 1px solid var(--accent);
  border-radius: 14px; padding: 14px 16px;
  z-index: 200;
  box-shadow: 0 8px 32px rgba(0,0,0,0.5);
}
.install-row { display: flex; align-items: center; gap: 12px; }
.install-icon { font-size: 28px; }
.install-text { flex: 1; }
.install-text b { font-size: 14px; display: block; margin-bottom: 2px; }
.install-text span { font-size: 12px; color: var(--muted); }
.install-btn { background: var(--accent); color: #fff; border: none; border-radius: 8px; padding: 8px 14px; font-size: 13px; cursor: pointer; white-space: nowrap; }
.install-close { position: absolute; top: 8px; right: 10px; background: none; border: none; color: var(--muted); font-size: 18px; cursor: pointer; padding: 4px; }

.toast {
  position: fixed; bottom: calc(var(--safe-bot) + 24px); left: 50%; transform: translateX(-50%) translateY(20px);
  background: var(--surface2); border: 1px solid var(--border);
  color: var(--text); padding: 10px 20px; border-radius: 24px;
  font-size: 13px; letter-spacing: 0.04em;
  opacity: 0; transition: opacity .25s, transform .25s;
  z-index: 999; white-space: nowrap;
  box-shadow: 0 8px 32px rgba(0,0,0,0.4);
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<div class="header">
  <span class="header-title">Gurlove SPARE FINDER</span>
  <span class="count-badge" id="count">0 items</span>
</div>

<div class="tabs">
  <div class="tab active" onclick="switchTab('add')">＋ Add</div>
  <div class="tab" onclick="switchTab('search')">⌕ Search</div>
</div>

<!-- ADD PANEL -->
<div class="panel active" id="panel-add">
  <div class="form-wrap">
    <div class="field">
      <div class="field-label">Supplier</div>
      <input id="supplier" placeholder="e.g. KLP Delhi" autocomplete="off">
    </div>
    <div class="field">
      <div class="field-label">Date</div>
      <input id="date" placeholder="DD/MM/YYYY" maxlength="10" inputmode="numeric" onkeyup="formatDate(this)">
    </div>
    <div class="field">
      <div class="field-label">WhatsApp Message</div>
      <textarea id="raw" placeholder="Paste full price list here…"></textarea>
    </div>
    <button class="btn btn-add" onclick="addData()">Add & Save</button>
    <div class="btn-row">
      <button class="btn btn-export" onclick="exportData()">⬆ Export Backup</button>
      <button class="btn btn-import" onclick="document.getElementById('import-file').click()">⬇ Import Backup</button>
    </div>
    <input type="file" id="import-file" accept=".json" style="display:none" onchange="importData(this)">
    <button class="btn btn-clear" onclick="clearData()">Clear All Data</button>
  </div>
</div>

<!-- SEARCH PANEL -->
<div class="panel" id="panel-search">
  <div class="search-wrap">
    <div class="search-box">
      <span class="search-icon">⌕</span>
      <input id="search" placeholder="Model, brand, type…" onkeyup="onSearch()" autocomplete="off" autocorrect="off" spellcheck="false">
    </div>
  </div>
  <div class="results-meta" id="results-meta"></div>
  <div id="scroll-container">
    <div id="scroll-spacer"></div>
    <div id="scroll-visible"></div>
  </div>
  <div id="empty-state" class="empty-state" style="display:none">
    <div class="empty-icon">📦</div>
    <div class="empty-title">No results</div>
    <div class="empty-sub">Try a different model name,<br>brand, or screen type.</div>
  </div>
  <div id="no-data-state" class="empty-state" style="display:none">
    <div class="empty-icon">📋</div>
    <div class="empty-title">No data yet</div>
    <div class="empty-sub">Go to the Add tab and paste<br>a price list to get started.</div>
  </div>
</div>

<!-- Install banner (Android Chrome) -->
<div id="install-banner">
  <button class="install-close" onclick="dismissInstall()">✕</button>
  <div class="install-row">
    <div class="install-icon">📱</div>
    <div class="install-text">
      <b>Install Spare Finder</b>
      <span>Add to home screen for offline use</span>
    </div>
    <button class="install-btn" onclick="doInstall()">Install</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
/* ─── Service Worker ─── */
if ('serviceWorker' in navigator) {
  window.addEventListener('load', function() {
    navigator.serviceWorker.register('sw.js').catch(function(){});
  });
}

/* ─── Install prompt (Android Chrome) ─── */
var deferredPrompt = null;
window.addEventListener('beforeinstallprompt', function(e) {
  e.preventDefault();
  deferredPrompt = e;
  document.getElementById('install-banner').style.display = 'block';
});
window.addEventListener('appinstalled', function() {
  document.getElementById('install-banner').style.display = 'none';
  toast('✓ App installed!');
});
function doInstall() {
  if (!deferredPrompt) return;
  deferredPrompt.prompt();
  deferredPrompt.userChoice.then(function(){ deferredPrompt = null; dismissInstall(); });
}
function dismissInstall() {
  document.getElementById('install-banner').style.display = 'none';
}

/* ─── Data ─── */
var db = [];
try { var s = localStorage.getItem("spareDB"); if (s) db = JSON.parse(s); } catch(e){}

/* ─── Virtual scroll state ─── */
var CARD_H = 88;
var filtered = [];
var scrollEl, spacerEl, visibleEl;
var containerH = 0;
var renderStart = 0, renderEnd = 0;
var ticking = false;

/* ─── Init ─── */
window.addEventListener('DOMContentLoaded', function() {
  scrollEl  = document.getElementById('scroll-container');
  spacerEl  = document.getElementById('scroll-spacer');
  visibleEl = document.getElementById('scroll-visible');

  updateCount();
  setContainerHeight();
  window.addEventListener('resize', setContainerHeight);
  scrollEl.addEventListener('scroll', onScroll, { passive: true });
  onSearch();
});

function setContainerHeight() {
  var safeTop = parseInt(getComputedStyle(document.documentElement).getPropertyValue('--safe-top')) || 0;
  var top = safeTop + 56 + 44 + 66 + 28;
  containerH = window.innerHeight - top;
  scrollEl.style.height = containerH + 'px';
}

/* ─── Tabs ─── */
function switchTab(name) {
  document.querySelectorAll('.tab').forEach(function(t, i) {
    t.classList.toggle('active', (i === 0) === (name === 'add'));
  });
  document.getElementById('panel-add').classList.toggle('active', name === 'add');
  document.getElementById('panel-search').classList.toggle('active', name === 'search');
  if (name === 'search') {
    setTimeout(function(){ document.getElementById('search').focus(); }, 100);
    setContainerHeight();
    renderVisible();
  }
}

/* ─── Date ─── */
function formatDate(el) {
  var v = el.value.replace(/[^0-9]/g, "");
  if (v.length > 2) v = v.substring(0,2) + "/" + v.substring(2);
  if (v.length > 5) v = v.substring(0,5) + "/" + v.substring(5,9);
  el.value = v;
}
function isValidDate(d) { return /^\d{2}\/\d{2}\/\d{4}$/.test(d); }

/* ─── Add Data ─── */
function addData() {
  var text     = document.getElementById("raw").value.trim();
  var supplier = document.getElementById("supplier").value.trim() || "-";
  var date     = document.getElementById("date").value.trim();

  if (!text)              { toast("Paste a price list first"); return; }
  if (!isValidDate(date)) { toast("Enter date as DD/MM/YYYY"); return; }

  var currentBrand = "-", currentType = "-", added = 0;
  var lines = text.split("\n");

  for (var i = 0; i < lines.length; i++) {
    var line = lines[i].trim();
    if (!line) continue;
    var u = line.toUpperCase();

    if (line.indexOf("=") === -1) {
      if      (u.indexOf("INCELL") > -1) currentType = "INCELL";
      else if (u.indexOf("OLED")   > -1) currentType = "OLED";
      else if (u.indexOf("GX")     > -1) currentType = "GX";
      else if (u.indexOf("OG")     > -1) currentType = "OG";
      else if (u.indexOf("AAA")    > -1) currentType = "AAA";
      else if (u.indexOf("TFT")    > -1) currentType = "TFT";
      if (u.indexOf("SAMSUNG")>-1||u.indexOf("IPHONE")>-1||
          u.indexOf("REDMI")>-1||u.indexOf("MI ")>-1||
          u.indexOf("VIVO")>-1||u.indexOf("OPPO")>-1||
          u.indexOf("REALME")>-1||u.indexOf("NOKIA")>-1||
          u.indexOf("MOTO")>-1||u.indexOf("PIXEL")>-1||
          u.indexOf("ONEPLUS")>-1) {
        currentBrand = line.replace(/[^A-Za-z ]/g,"").trim();
      }
      continue;
    }
    var parts = line.split("=");
    var price = parts.pop().trim();
    var model = parts.join("=").trim();
    if (model && price) {
      db.push({ brand: currentBrand, model: model, price: price,
                type: currentType, supplier: supplier, date: date });
      added++;
    }
  }

  try { localStorage.setItem("spareDB", JSON.stringify(db)); } catch(e){ toast("Storage full!"); }
  document.getElementById("raw").value = "";
  updateCount(); onSearch();
  toast("✓ Added " + added + " items");
}

/* ─── Export ─── */
function exportData() {
  if (db.length === 0) { toast("No data to export"); return; }
  var now = new Date();
  var pad = function(n){ return n < 10 ? '0'+n : n; };
  var filename = "spare-backup-" + now.getFullYear() + pad(now.getMonth()+1) + pad(now.getDate()) + "-" + pad(now.getHours()) + pad(now.getMinutes()) + ".json";
  var json = JSON.stringify({ version: 1, exported: now.toISOString(), count: db.length, data: db }, null, 2);
  var blob = new Blob([json], { type: 'application/json' });
  var url  = URL.createObjectURL(blob);
  var a    = document.createElement('a');
  a.href = url; a.download = filename;
  document.body.appendChild(a); a.click();
  setTimeout(function(){ document.body.removeChild(a); URL.revokeObjectURL(url); }, 1000);
  toast("✓ Exported " + db.length + " items");
}

/* ─── Import ─── */
function importData(input) {
  var file = input.files[0];
  if (!file) return;
  var reader = new FileReader();
  reader.onload = function(e) {
    try {
      var parsed = JSON.parse(e.target.result);
      var incoming = parsed.data || parsed;
      if (!Array.isArray(incoming)) throw new Error("Invalid format");
      var valid = incoming.filter(function(r){ return r && typeof r.model === 'string' && typeof r.price === 'string'; });
      if (valid.length === 0) { toast("No valid items found"); return; }
      var merge = db.length === 0 ? true : confirm("Import " + valid.length + " items.\n\nOK = Merge\nCancel = Replace all");
      if (!merge) db = [];
      db = db.concat(valid);
      try { localStorage.setItem("spareDB", JSON.stringify(db)); } catch(e){ toast("Storage full!"); return; }
      updateCount(); onSearch();
      toast("✓ Imported " + valid.length + " items");
    } catch(err) { toast("Invalid backup file"); }
    input.value = "";
  };
  reader.readAsText(file);
}

/* ─── Clear ─── */
function clearData() {
  if (!confirm("Delete ALL saved data?")) return;
  localStorage.removeItem("spareDB");
  db = []; filtered = [];
  updateCount(); renderVirtualList();
  toast("All data cleared");
}

/* ─── Search ─── */
function onSearch() {
  var q = (document.getElementById("search") ? document.getElementById("search").value : "").toLowerCase().trim();
  if (db.length === 0) { filtered = []; }
  else if (!q) { filtered = db.slice(); }
  else {
    filtered = [];
    for (var i = 0; i < db.length; i++) {
      var d = db[i];
      if (d.model.toLowerCase().indexOf(q) > -1 || d.brand.toLowerCase().indexOf(q) > -1 ||
          d.type.toLowerCase().indexOf(q)  > -1 || d.supplier.toLowerCase().indexOf(q) > -1) {
        filtered.push(d);
      }
    }
  }
  renderVirtualList();
}

/* ─── Virtual list ─── */
function renderVirtualList() {
  var meta     = document.getElementById('results-meta');
  var emptyEl  = document.getElementById('empty-state');
  var noDataEl = document.getElementById('no-data-state');

  if (db.length === 0) {
    noDataEl.style.display = ''; emptyEl.style.display = 'none';
    meta.textContent = ''; spacerEl.style.height = '0'; visibleEl.innerHTML = '';
    return;
  }
  noDataEl.style.display = 'none';
  var q = document.getElementById("search").value.trim();
  if (filtered.length === 0 && q) {
    emptyEl.style.display = ''; meta.textContent = '0 results';
    spacerEl.style.height = '0'; visibleEl.innerHTML = '';
    return;
  }
  emptyEl.style.display = 'none';
  var total = filtered.length;
  meta.textContent = total + ' result' + (total === 1 ? '' : 's');
  spacerEl.style.height = (total * CARD_H) + 'px';
  scrollEl.scrollTop = 0;
  renderVisible();
}

function onScroll() {
  if (!ticking) {
    requestAnimationFrame(function() { renderVisible(); ticking = false; });
    ticking = true;
  }
}

var OVERSCAN = 5;
function renderVisible() {
  if (!scrollEl) return;
  var scrollTop = scrollEl.scrollTop;
  var total = filtered.length;
  if (total === 0) { visibleEl.innerHTML = ''; return; }
  var first = Math.max(0, Math.floor(scrollTop / CARD_H) - OVERSCAN);
  var last  = Math.min(total - 1, Math.ceil((scrollTop + containerH) / CARD_H) + OVERSCAN);
  if (first === renderStart && last === renderEnd) return;
  renderStart = first; renderEnd = last;
  visibleEl.style.top = (first * CARD_H) + 'px';
  var html = '';
  for (var i = first; i <= last; i++) {
    var d = filtered[i];
    var brandStr = (d.brand && d.brand !== '-') ? d.brand + ' – ' : '';
    html += "<div class='card'><div class='card-top'><span class='card-model'>" + esc(brandStr + d.model) +
      "</span><span class='card-price'>₹" + esc(d.price) + "</span></div>" +
      "<div class='card-bottom'><span class='badge' style='background:var(--" + d.type + ",#4b5563)'>" + esc(d.type) +
      "</span><span class='card-meta'>" + esc(d.supplier) + " · " + esc(d.date) + "</span></div></div>";
  }
  visibleEl.innerHTML = html;
}

/* ─── Helpers ─── */
function updateCount() {
  document.getElementById('count').textContent = db.length + ' item' + (db.length === 1 ? '' : 's');
}
function esc(str) {
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
var toastTimer;
function toast(msg) {
  var el = document.getElementById('toast');
  el.textContent = msg; el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(function(){ el.classList.remove('show'); }, 2200);
}
</script>
</body>
</html>
